# Cloud Build pipeline: on every push to main, build and deploy Helm to Cloud Run.
# Connect this to GitHub via:
#   gcloud builds triggers create github \
#     --name=helm-app-main \
#     --repo-owner=bensmith84-ops \
#     --repo-name=helm-app \
#     --branch-pattern=^main$ \
#     --build-config=cloudbuild.yaml \
#     --project=helm-490123
#
# After that's set up, every git push triggers a fresh build + deploy automatically.

steps:
  # 1. Build the image, baking in the NEXT_PUBLIC_ env vars
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_URL=$_NEXT_PUBLIC_SUPABASE_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY=$_NEXT_PUBLIC_SUPABASE_ANON_KEY'
      - '--build-arg'
      - 'NEXT_PUBLIC_BQ_PROXY_URL=$_NEXT_PUBLIC_BQ_PROXY_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_BQ_PROXY_TOKEN=$_NEXT_PUBLIC_BQ_PROXY_TOKEN'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=$_NEXT_PUBLIC_FIREBASE_API_KEY'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=$_NEXT_PUBLIC_FIREBASE_PROJECT_ID'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=$_NEXT_PUBLIC_FIREBASE_APP_ID'
      - '--build-arg'
      - 'NEXT_PUBLIC_HELM_API_URL=$_NEXT_PUBLIC_HELM_API_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_USE_HELM_API=$_NEXT_PUBLIC_USE_HELM_API'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/helm/helm-app:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/helm/helm-app:latest'
      - '.'

  # 2. Push both tags to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'us-central1-docker.pkg.dev/$PROJECT_ID/helm/helm-app']

  # 3. Deploy the new image to Cloud Run.
  #    --set-secrets pulls runtime-only secrets from Secret Manager (anything
  #    NOT prefixed NEXT_PUBLIC_ stays server-side).
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'helm-app'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/helm/helm-app:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--timeout=60s'
      - '--service-account=helm-app-runtime@$PROJECT_ID.iam.gserviceaccount.com'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/helm/helm-app:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/helm/helm-app:latest'

options:
  # bigger machine = faster builds, especially for a Next.js app with 40 components
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'  # 20 minutes — Next.js builds can be slow first time

# Substitution variables — supply via the trigger config OR override at trigger time.
# These default to empty so cloudbuild.yaml validates; the trigger must set them.
substitutions:
  _NEXT_PUBLIC_SUPABASE_URL: 'https://upbjdmnykheubxkuknuj.supabase.co'
  _NEXT_PUBLIC_SUPABASE_ANON_KEY: ''
  _NEXT_PUBLIC_BQ_PROXY_URL: ''
  _NEXT_PUBLIC_BQ_PROXY_TOKEN: ''
  _NEXT_PUBLIC_FIREBASE_API_KEY: ''
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ''
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: ''
  _NEXT_PUBLIC_FIREBASE_APP_ID: ''
  _NEXT_PUBLIC_HELM_API_URL: ''
  _NEXT_PUBLIC_USE_HELM_API: 'false'
